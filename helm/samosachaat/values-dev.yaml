## Dev overrides — single-slot, 1 replica, small resources, no HPA.

global:
  imageTag: dev-latest

namespace:
  name: samosachaat-dev

config:
  ENVIRONMENT: "dev"
  LOG_LEVEL: "debug"

frontend:
  replicaCount: 1
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 250m
      memory: 256Mi

auth:
  replicaCount: 1
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 250m
      memory: 256Mi

chatApi:
  replicaCount: 1
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  hpa:
    enabled: false

inference:
  replicaCount: 1
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: '1'
      memory: 2Gi
  hpa:
    enabled: false

pdb:
  enabled: false
